<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Table - Little Lemon</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="Book.css" />
  </head>
  <body>
    <header>
      <img src="./images/asset14.png" alt="Little Lemon logo" />
    </header>

    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Menu.html">Menu</a></li>
        <li><a href="Book.html" class="active">Book</a></li>
      </ul>
    </nav>

    <main class="book-page">
      <section class="hero">
        <h1>Book a Table</h1>
        <p>Reserve your spot at Little Lemon — fast and easy.</p><br />
      </section>

      <section class="map-book">
        <div class="map">
          <div class="map-wrapper">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d8410.566083560092!2d23.634544231018783!3d37.96420622935801!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sel!2sgr!4v1746633717992!5m2!1sel!2sgr"
              style="border:0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>

        <div class="booking-form">
          <div class="form-card">
            <h2>Reserve a table</h2>
            <form action="#" method="post">
              <div class="row">
                <label>Full name<input type="text" name="name" required /></label>
                <label>Email<input type="email" name="email" required /></label>
              </div>
              <div class="row">
                <label>Phone<input type="tel" name="phone" required /></label>
                <label>Guests
                  <select name="guests">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5+</option>
                  </select>
                </label>
              </div>
              <div class="row">
                <label>Date<input type="date" name="date" required /></label>
                <label>Time<input type="time" name="time" required /></label>
              </div>
              <label>Notes<textarea name="notes" rows="3" placeholder="Any requests (optional)"></textarea></label>
              <div class="actions">
                <button type="submit">Book now</button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section class="contact">
        <div class="contact-card">
          <h2>Contact & Location</h2>
          <p><strong>Address:</strong> Αγίου Δημητρίου</p>
          <p><strong>Phone:</strong> 2109486366</p>
          <p><strong>Opening Hours:</strong> Mon–Sun 14:00–23:00</p>
        </div>
      </section>
    </main>

    <footer>
      <hr />
      <div class="foot">
        <img src="./images/asset7.png" alt="Little Lemon footer logo" />
        <p>Copyright Little Lemon</p>
      </div>
    </footer>
  </body>
</html>
